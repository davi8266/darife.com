<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel Admin — Dawid Rizzo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --c1: #FF6B6B; --c2: #FFE66D; --c3: #4ECDC4; --c4: #A855F7; --c5: #F97316;
      --dark: #0f0f13; --card: #1a1a24; --card2: #141419;
      --mono: 'Space Mono', monospace; --display: 'Syne', sans-serif;
    }
    body { background: var(--dark); color: #fff; font-family: var(--display); min-height: 100vh; }

    /* ── NAV ── */
    nav {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1.2rem 2rem; border-bottom: 1px solid #ffffff10;
      background: #0f0f13ee; backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 100;
    }
    .nav-left { display: flex; align-items: center; gap: 12px; }
    .logo { font-size: 1.1rem; font-weight: 800; background: linear-gradient(90deg, var(--c1), var(--c4)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .admin-badge { font-family: var(--mono); font-size: 0.65rem; background: #A855F720; border: 1px solid #A855F740; color: var(--c4); padding: 3px 10px; border-radius: 99px; letter-spacing: 0.06em; }
    .nav-right { display: flex; align-items: center; gap: 16px; }
    .nav-email { font-family: var(--mono); font-size: 0.72rem; color: #555; }
    .btn-logout { font-family: var(--mono); font-size: 0.72rem; color: #555; background: none; border: 1px solid #ffffff15; border-radius: 6px; padding: 6px 14px; cursor: pointer; transition: color 0.2s, border-color 0.2s; }
    .btn-logout:hover { color: var(--c1); border-color: var(--c1); }
    .btn-site { font-family: var(--mono); font-size: 0.72rem; color: var(--c3); background: none; border: 1px solid #4ECDC430; border-radius: 6px; padding: 6px 14px; cursor: pointer; text-decoration: none; transition: background 0.2s; }
    .btn-site:hover { background: #4ECDC415; }

    /* ── LAYOUT ── */
    .container { max-width: 1000px; margin: 0 auto; padding: 2.5rem 2rem; }

    /* ── TABS ── */
    .tabs { display: flex; gap: 4px; margin-bottom: 2rem; border-bottom: 1px solid #ffffff10; }
    .tab {
      font-family: var(--mono); font-size: 0.75rem; letter-spacing: 0.06em;
      padding: 10px 18px; cursor: pointer; color: #555; background: none; border: none;
      border-bottom: 2px solid transparent; transition: color 0.2s; margin-bottom: -1px;
    }
    .tab:hover { color: #aaa; }
    .tab.active { color: var(--c4); border-bottom-color: var(--c4); }

    /* ── PANELS ── */
    .panel { display: none; }
    .panel.active { display: block; }

    /* ── FORM ELEMENTS ── */
    .form-group { margin-bottom: 1.25rem; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }
    label { display: block; font-family: var(--mono); font-size: 0.68rem; color: #555; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
    input, textarea, select {
      width: 100%; padding: 10px 14px;
      background: var(--card2); border: 1px solid #ffffff12;
      border-radius: 8px; color: #fff;
      font-family: var(--mono); font-size: 0.83rem; outline: none;
      transition: border-color 0.2s; resize: vertical;
    }
    input:focus, textarea:focus { border-color: var(--c4); }
    textarea { min-height: 90px; }

    /* ── CARD ── */
    .card { background: var(--card); border: 1px solid #ffffff0e; border-radius: 14px; padding: 1.5rem; margin-bottom: 1rem; }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; }
    .card-title { font-size: 0.95rem; font-weight: 700; }
    .card-subtitle { font-family: var(--mono); font-size: 0.7rem; color: #555; margin-top: 2px; }

    /* ── BUTTONS ── */
    .btn-save {
      padding: 10px 24px; background: var(--c4); color: #fff; border: none;
      border-radius: 8px; font-family: var(--display); font-size: 0.85rem;
      font-weight: 700; cursor: pointer; transition: opacity 0.2s;
    }
    .btn-save:hover { opacity: 0.85; }
    .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-danger { padding: 7px 14px; background: #FF6B6B18; color: var(--c1); border: 1px solid #FF6B6B30; border-radius: 6px; font-family: var(--mono); font-size: 0.72rem; cursor: pointer; transition: background 0.2s; }
    .btn-danger:hover { background: #FF6B6B30; }
    .btn-add { padding: 10px 20px; background: transparent; color: var(--c3); border: 1px dashed #4ECDC440; border-radius: 8px; font-family: var(--mono); font-size: 0.78rem; cursor: pointer; width: 100%; margin-top: 0.5rem; transition: background 0.2s; }
    .btn-add:hover { background: #4ECDC410; }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 2rem; right: 2rem;
      background: var(--card); border: 1px solid #ffffff15;
      border-radius: 10px; padding: 12px 20px;
      font-family: var(--mono); font-size: 0.78rem; color: var(--c3);
      opacity: 0; transform: translateY(10px);
      transition: opacity 0.3s, transform 0.3s; pointer-events: none; z-index: 999;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    /* ── PROJECT ITEM ── */
    .project-item { background: var(--card2); border: 1px solid #ffffff0a; border-radius: 10px; padding: 1.25rem; margin-bottom: 0.75rem; }
    .project-item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .project-num { font-family: var(--mono); font-size: 0.7rem; color: #444; }

    /* ── MESSAGES ── */
    .message-item { background: var(--card2); border: 1px solid #ffffff0a; border-radius: 10px; padding: 1.25rem; margin-bottom: 0.75rem; }
    .message-meta { display: flex; gap: 12px; margin-bottom: 8px; flex-wrap: wrap; }
    .message-name { font-weight: 700; font-size: 0.9rem; }
    .message-email { font-family: var(--mono); font-size: 0.72rem; color: var(--c3); }
    .message-date { font-family: var(--mono); font-size: 0.7rem; color: #444; margin-left: auto; }
    .message-text { font-family: var(--mono); font-size: 0.8rem; color: #888; line-height: 1.65; }
    .empty-state { text-align: center; padding: 3rem; font-family: var(--mono); font-size: 0.8rem; color: #444; }

    /* ── SKILL TAG ── */
    .skills-editor { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 0.5rem; }
    .skill-item { display: flex; align-items: center; gap: 6px; background: #ffffff08; border: 1px solid #ffffff12; border-radius: 6px; padding: 5px 10px; font-family: var(--mono); font-size: 0.75rem; }
    .skill-remove { background: none; border: none; color: #555; cursor: pointer; font-size: 14px; line-height: 1; padding: 0; transition: color 0.2s; }
    .skill-remove:hover { color: var(--c1); }
    .skill-input-row { display: flex; gap: 8px; margin-top: 10px; }
    .skill-input-row input { flex: 1; }
    .btn-add-skill { padding: 10px 16px; background: var(--c4); color: #fff; border: none; border-radius: 8px; font-family: var(--mono); font-size: 0.78rem; cursor: pointer; white-space: nowrap; }
  </style>
</head>
<body>

<nav>
  <div class="nav-left">
    <div class="logo">darife.com</div>
    <span class="admin-badge">ADMIN</span>
  </div>
  <div class="nav-right">
    <span class="nav-email" id="user-email"></span>
    <a class="btn-site" href="../index.html" target="_blank">Ver site ↗</a>
    <button class="btn-logout" onclick="logout()">Sair</button>
  </div>
</nav>

<div class="container">
  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('bio')">Bio & Sobre</button>
    <button class="tab" onclick="switchTab('skills')">Skills</button>
    <button class="tab" onclick="switchTab('projects')">Projetos</button>
    <button class="tab" onclick="switchTab('messages')">Mensagens</button>
  </div>

  <!-- ── TAB: BIO ── -->
  <div class="panel active" id="tab-bio">
    <div class="card">
      <div class="card-header">
        <div>
          <div class="card-title">Bio e Apresentação</div>
          <div class="card-subtitle">Texto exibido na seção hero e sobre</div>
        </div>
        <button class="btn-save" onclick="saveBio()">Salvar</button>
      </div>
      <div class="form-group">
        <label>Subtítulo (hero)</label>
        <textarea id="bio-subtitle" placeholder="Desenvolvedor que transforma ideias..."></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Parágrafo 1</label>
          <textarea id="bio-p1"></textarea>
        </div>
        <div class="form-group">
          <label>Parágrafo 2</label>
          <textarea id="bio-p2"></textarea>
        </div>
      </div>
      <div class="form-group">
        <label>Parágrafo 3</label>
        <textarea id="bio-p3"></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Status (badge)</label>
          <input type="text" id="bio-status" placeholder="disponível para projetos" />
        </div>
        <div class="form-group">
          <label>Email de contato</label>
          <input type="email" id="bio-email" placeholder="contato@darife.com" />
        </div>
      </div>
    </div>
  </div>

  <!-- ── TAB: SKILLS ── -->
  <div class="panel" id="tab-skills">
    <div class="card">
      <div class="card-header">
        <div>
          <div class="card-title">Tecnologias</div>
          <div class="card-subtitle">Skills exibidas na faixa do portfólio</div>
        </div>
        <button class="btn-save" onclick="saveSkills()">Salvar</button>
      </div>
      <div class="skills-editor" id="skills-list"></div>
      <div class="skill-input-row">
        <input type="text" id="new-skill" placeholder="Ex: React, Docker, AWS..." />
        <button class="btn-add-skill" onclick="addSkill()">+ Adicionar</button>
      </div>
    </div>
  </div>

  <!-- ── TAB: PROJECTS ── -->
  <div class="panel" id="tab-projects">
    <div id="projects-list"></div>
    <button class="btn-add" onclick="addProject()">+ Adicionar novo projeto</button>
  </div>

  <!-- ── TAB: MESSAGES ── -->
  <div class="panel" id="tab-messages">
    <div id="messages-list"></div>
  </div>
</div>

<div class="toast" id="toast">✓ Salvo com sucesso!</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // ⚠️ SUBSTITUA com suas credenciais do Supabase
  const SUPABASE_URL = 'https://tqxozexxqfjcshkeuwdg.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_jUM3JtKDEZhZNRfBuISMXA_eDwpgmuG';

  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let skills = [];
  let projects = [];

  // ── AUTH ──
  async function init() {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) { window.location.href = 'login.html'; return; }
    document.getElementById('user-email').textContent = session.user.email;
    loadAll();
  }

  async function logout() {
    await sb.auth.signOut();
    window.location.href = 'login.html';
  }

  // ── TABS ──
  function switchTab(name) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById('tab-' + name).classList.add('active');
  }

  // ── TOAST ──
  function showToast(msg = '✓ Salvo com sucesso!') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // ── LOAD ALL ──
  async function loadAll() {
    await loadBio();
    await loadSkills();
    await loadProjects();
    await loadMessages();
  }

  // ── BIO ──
  async function loadBio() {
    const { data } = await sb.from('bio').select('*').single();
    if (!data) return;
    document.getElementById('bio-subtitle').value = data.subtitle || '';
    document.getElementById('bio-p1').value = data.p1 || '';
    document.getElementById('bio-p2').value = data.p2 || '';
    document.getElementById('bio-p3').value = data.p3 || '';
    document.getElementById('bio-status').value = data.status || '';
    document.getElementById('bio-email').value = data.email || '';
  }

  async function saveBio() {
    const payload = {
      subtitle: document.getElementById('bio-subtitle').value,
      p1: document.getElementById('bio-p1').value,
      p2: document.getElementById('bio-p2').value,
      p3: document.getElementById('bio-p3').value,
      status: document.getElementById('bio-status').value,
      email: document.getElementById('bio-email').value,
    };
    const { data } = await sb.from('bio').select('id').single();
    if (data) {
      await sb.from('bio').update(payload).eq('id', data.id);
    } else {
      await sb.from('bio').insert(payload);
    }
    showToast('✓ Bio salva!');
  }

  // ── SKILLS ──
  async function loadSkills() {
    const { data } = await sb.from('skills').select('*').order('order');
    skills = data || [];
    renderSkills();
  }

  function renderSkills() {
    const el = document.getElementById('skills-list');
    el.innerHTML = skills.map((s, i) => `
      <div class="skill-item">
        ${s.name}
        <button class="skill-remove" onclick="removeSkill(${i})">×</button>
      </div>
    `).join('');
  }

  function addSkill() {
    const input = document.getElementById('new-skill');
    const val = input.value.trim();
    if (!val) return;
    skills.push({ name: val, order: skills.length });
    renderSkills();
    input.value = '';
  }

  function removeSkill(i) {
    skills.splice(i, 1);
    renderSkills();
  }

  async function saveSkills() {
    await sb.from('skills').delete().neq('id', 0);
    const rows = skills.map((s, i) => ({ name: s.name, order: i }));
    await sb.from('skills').insert(rows);
    showToast('✓ Skills salvas!');
  }

  // ── PROJECTS ──
  async function loadProjects() {
    const { data } = await sb.from('projects').select('*').order('order');
    projects = data || [];
    renderProjects();
  }

  function renderProjects() {
    const el = document.getElementById('projects-list');
    el.innerHTML = projects.map((p, i) => `
      <div class="project-item" id="proj-${i}">
        <div class="project-item-header">
          <span class="project-num">PROJETO ${i + 1}</span>
          <button class="btn-danger" onclick="removeProject(${i})">Remover</button>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Nome</label>
            <input type="text" value="${p.name || ''}" onchange="projects[${i}].name = this.value" />
          </div>
          <div class="form-group">
            <label>Emoji / Ícone</label>
            <input type="text" value="${p.icon || ''}" onchange="projects[${i}].icon = this.value" placeholder="🌐" />
          </div>
        </div>
        <div class="form-group">
          <label>Descrição</label>
          <textarea onchange="projects[${i}].description = this.value">${p.description || ''}</textarea>
        </div>
        <div class="form-group">
          <label>Tags (separadas por vírgula)</label>
          <input type="text" value="${(p.tags || []).join(', ')}" onchange="projects[${i}].tags = this.value.split(',').map(t => t.trim())" />
        </div>
        <div class="form-group">
          <label>Link do projeto (opcional)</label>
          <input type="url" value="${p.link || ''}" onchange="projects[${i}].link = this.value" placeholder="https://github.com/..." />
        </div>
      </div>
    `).join('');
  }

  function addProject() {
    projects.push({ name: '', icon: '🚀', description: '', tags: [], link: '', order: projects.length });
    renderProjects();
  }

  function removeProject(i) {
    projects.splice(i, 1);
    renderProjects();
  }

  async function saveProjects() {
    await sb.from('projects').delete().neq('id', 0);
    const rows = projects.map((p, i) => ({ ...p, order: i, id: undefined }));
    await sb.from('projects').insert(rows);
    showToast('✓ Projetos salvos!');
  }

  // Salva projetos ao clicar Salvar na aba
  document.addEventListener('click', e => {
    if (e.target.classList.contains('btn-save') && document.getElementById('tab-projects').classList.contains('active')) {
      saveProjects();
    }
  });

  // ── MESSAGES ──
  async function loadMessages() {
    const { data } = await sb.from('messages').select('*').order('created_at', { ascending: false });
    const el = document.getElementById('messages-list');
    if (!data || data.length === 0) {
      el.innerHTML = '<div class="empty-state">Nenhuma mensagem ainda.</div>';
      return;
    }
    el.innerHTML = data.map(m => `
      <div class="message-item">
        <div class="message-meta">
          <span class="message-name">${m.name}</span>
          <span class="message-email">${m.email}</span>
          <span class="message-date">${new Date(m.created_at).toLocaleDateString('pt-BR')}</span>
        </div>
        <div class="message-text">${m.message}</div>
      </div>
    `).join('');
  }

  init();
</script>
</body>
</html>
