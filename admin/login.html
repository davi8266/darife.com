<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Dawid Rizzo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --c1: #C2185B;
      --mono: 'Space Mono', monospace;
      --display: 'Syne', sans-serif;
    }
    body {
      background: #F9F9F9;
      color: #111;
      font-family: var(--display);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 18px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 4px 32px rgba(194, 24, 91, 0.08);
    }
    .login-logo {
      font-size: 1.3rem;
      font-weight: 800;
      background: linear-gradient(90deg, #2D0A1E, #C2185B, #F48FB1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.4rem;
    }
    .login-sub {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: #999;
      margin-bottom: 2rem;
      letter-spacing: 0.04em;
    }
    label {
      display: block;
      font-family: var(--mono);
      font-size: 0.68rem;
      color: #999;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 11px 14px;
      background: #F4F4F4;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      color: #111;
      font-family: var(--mono);
      font-size: 0.85rem;
      margin-bottom: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #C2185B; }
    .btn {
      width: 100%;
      padding: 12px;
      background: #C2185B;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: var(--display);
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn:hover { opacity: 0.85; transform: translateY(-1px); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .error {
      background: #C2185B12;
      border: 1px solid #C2185B30;
      border-radius: 8px;
      padding: 10px 14px;
      font-family: var(--mono);
      font-size: 0.78rem;
      color: #C2185B;
      margin-bottom: 1rem;
      display: none;
    }
    .back {
      display: block;
      text-align: center;
      margin-top: 1.5rem;
      font-family: var(--mono);
      font-size: 0.72rem;
      color: #bbb;
      text-decoration: none;
      transition: color 0.2s;
    }
    .back:hover { color: #C2185B; }
    .divider {
      height: 1px;
      background: #e0e0e0;
      margin: 1.5rem 0;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-logo">darife.com</div>
    <div class="login-sub">// painel administrativo</div>

    <div class="error" id="error-msg">Email ou senha incorretos.</div>

    <label>EMAIL</label>
    <input type="email" id="email" placeholder="seu@email.com" />

    <label>SENHA</label>
    <input type="password" id="password" placeholder="••••••••" />

    <button class="btn" id="btn-login" onclick="handleLogin()">Entrar</button>

    <a class="back" href="../index.html">← voltar ao site</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // ⚠️ SUBSTITUA com suas credenciais do Supabase
    const SUPABASE_URL = 'https://tqxozexxqfjcshkeuwdg.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_jUM3JtKDEZhZNRfBuISMXA_eDwpgmuG';

    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Redireciona se já estiver logado
    sb.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = 'index.html';
    });

    async function handleLogin() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('btn-login');
      const error = document.getElementById('error-msg');

      btn.disabled = true;
      btn.textContent = 'Entrando...';
      error.style.display = 'none';

      const { error: err } = await sb.auth.signInWithPassword({ email, password });

      if (err) {
        error.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Entrar';
      } else {
        window.location.href = 'index.html';
      }
    }

    // Login ao apertar Enter
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });
  </script>
</body>
</html>
