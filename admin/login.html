<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Dawid Rizzo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --c1: #FF6B6B; --c4: #A855F7; --c3: #4ECDC4;
      --dark: #0f0f13; --card: #1a1a24;
      --mono: 'Space Mono', monospace; --display: 'Syne', sans-serif;
    }
    body {
      background: var(--dark); color: #fff;
      font-family: var(--display);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .login-box {
      background: var(--card);
      border: 1px solid #ffffff12;
      border-radius: 18px;
      padding: 2.5rem 2rem;
      width: 100%; max-width: 380px;
    }
    .login-logo {
      font-size: 1.3rem; font-weight: 800;
      background: linear-gradient(90deg, var(--c1), var(--c4));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 0.4rem;
    }
    .login-sub {
      font-family: var(--mono); font-size: 0.72rem; color: #555;
      margin-bottom: 2rem; letter-spacing: 0.04em;
    }
    label {
      display: block; font-family: var(--mono); font-size: 0.72rem;
      color: #666; letter-spacing: 0.06em; margin-bottom: 6px;
    }
    input {
      width: 100%; padding: 11px 14px;
      background: #0f0f13; border: 1px solid #ffffff18;
      border-radius: 8px; color: #fff;
      font-family: var(--mono); font-size: 0.85rem;
      margin-bottom: 1rem; outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: var(--c4); }
    .btn {
      width: 100%; padding: 12px;
      background: var(--c4); color: #fff; border: none;
      border-radius: 8px; font-family: var(--display);
      font-size: 0.9rem; font-weight: 700; cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .error {
      background: #FF6B6B18; border: 1px solid #FF6B6B35;
      border-radius: 8px; padding: 10px 14px;
      font-family: var(--mono); font-size: 0.78rem; color: var(--c1);
      margin-bottom: 1rem; display: none;
    }
    .back {
      display: block; text-align: center; margin-top: 1.5rem;
      font-family: var(--mono); font-size: 0.72rem; color: #444;
      text-decoration: none; transition: color 0.2s;
    }
    .back:hover { color: #888; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-logo">dawid.dev</div>
    <div class="login-sub">// painel administrativo</div>

    <div class="error" id="error-msg">Email ou senha incorretos.</div>

    <label>EMAIL</label>
    <input type="email" id="email" placeholder="seu@email.com" />

    <label>SENHA</label>
    <input type="password" id="password" placeholder="••••••••" />

    <button class="btn" id="btn-login" onclick="handleLogin()">Entrar</button>

    <a class="back" href="../index.html">← voltar ao site</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // ⚠️ SUBSTITUA com suas credenciais do Supabase
    const SUPABASE_URL = 'https://tqxozexxqfjcshkeuwdg.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_jUM3JtKDEZhZNRfBuISMXA_eDwpgmuG';

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Redireciona se já estiver logado
    supabase.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = 'index.html';
    });

    async function handleLogin() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('btn-login');
      const error = document.getElementById('error-msg');

      btn.disabled = true;
      btn.textContent = 'Entrando...';
      error.style.display = 'none';

      const { error: err } = await supabase.auth.signInWithPassword({ email, password });

      if (err) {
        error.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Entrar';
      } else {
        window.location.href = 'index.html';
      }
    }

    // Login ao apertar Enter
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });
  </script>
</body>
</html>
